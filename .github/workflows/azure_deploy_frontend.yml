# .github\workflows\azure_deploy_frontend.yml

name: Deploy Frontend (Vite → Azure Storage CDN)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Node
      # -----------------------------
      - name: Setup Node (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------
      # Build frontend
      # -----------------------------
      - name: Build frontend
        env:
          # API / backend
          VITE_AZURE_API_URL: ${{ secrets.VITE_AZURE_API_URL }}
          VITE_AZURE_CDN_URL: ${{ secrets.VITE_AZURE_CDN_URL }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

          APIM_SUBSCRIPTION_KEY: ${{ secrets.VITE_APIM_SUBSCRIPTION_KEY }}

          # -----------------------------
          # MSAL / CIAM (FIXED NAMING)
          # -----------------------------
          VITE_AZURE_SPA_CLIENT_ID: ${{ secrets.VITE_AZURE_SPA_CLIENT_ID }}
          VITE_AZURE_AUTHORITY: ${{ secrets.VITE_AZURE_AUTHORITY }}
          VITE_AZURE_KNOWN_AUTHORITY: ${{ secrets.VITE_AZURE_KNOWN_AUTHORITY }}
          VITE_AZURE_REDIRECT_URI: ${{ secrets.VITE_AZURE_REDIRECT_URI }}
          VITE_API_SCOPE: ${{ secrets.VITE_API_SCOPE }}

        run: npm run build

      # -----------------------------
      # Verify build output
      # -----------------------------
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi

      # -----------------------------
      # Azure Login (OIDC)
      # -----------------------------
      - name: Azure Login
        uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Clear old files
      # -----------------------------
      - name: Clear old frontend files
        run: |
          az storage blob delete-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --source '$web' \
            --auth-mode login

      # -----------------------------
      # Upload new build
      # -----------------------------
      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --destination '$web' \
            --source dist \
            --overwrite true \
            --auth-mode login

      # -----------------------------
      # Optional CDN purge (disabled)
      # -----------------------------
      # - name: Purge Azure Front Door cache
      #   run: |
      #     az afd endpoint purge \
      #       --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
      #       --profile-name ${{ secrets.AZURE_FRONTDOOR_PROFILE_NAME }} \
      #       --endpoint-name ${{ secrets.AZURE_FRONTDOOR_ENDPOINT_NAME }} \
      #       --content-paths "/*"